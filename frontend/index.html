<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 中文文本情绪分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg:#0f172a; --surface:#1e293b; --surface2:#334155;
  --text:#e2e8f0; --text2:#94a3b8; --primary:#6366f1; --primary2:#818cf8;
  --positive:#10b981; --negative:#ef4444; --neutral:#f59e0b;
  --radius:12px; --gap:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
.container{max-width:1200px;margin:0 auto;padding:30px 24px;}

/* Header */
.header{text-align:center;padding:40px 0 30px;}
.header h1{font-size:2.5rem;background:linear-gradient(135deg,var(--primary2),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.header p{color:var(--text2);font-size:1.05rem;}

/* Tabs */
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:30px;}
.tab-btn{padding:10px 28px;border-radius:25px;border:1px solid var(--surface2);background:var(--surface);color:var(--text2);cursor:pointer;font-size:0.95rem;transition:all .25s;}
.tab-btn.active,.tab-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:var(--gap);border:1px solid var(--surface2);}

/* Input Area */
#singlePanel textarea{width:100%;height:150px;background:var(--bg);border:1px solid var(--surface2);border-radius:var(--radius);color:var(--text);padding:16px;font-size:1rem;resize:vertical;font-family:inherit;}
#singlePanel textarea:focus{outline:none;border-color:var(--primary);}
.btn-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;}
.btn{padding:10px 28px;border-radius:25px;border:none;cursor:pointer;font-size:0.95rem;font-weight:600;transition:all .25s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary2);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--surface2);color:var(--text);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* Result Card */
.result-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.result-emoji{font-size:3rem;}
.result-label{font-size:1.8rem;font-weight:700;}
.result-score{font-size:1.1rem;color:var(--text2);}
.label-positive{color:var(--positive);}.label-negative{color:var(--negative);}.label-neutral{color:var(--neutral);}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:20px;}
.metric{background:var(--bg);padding:16px;border-radius:var(--radius);text-align:center;}
.metric-value{font-size:1.6rem;font-weight:700;}
.metric-label{font-size:0.85rem;color:var(--text2);margin-top:4px;}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);}
.chart-box{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--surface2);height:350px;}
.chart-full{grid-column:1/-1;height:350px;}

/* Keywords */
.keywords{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.keyword{padding:6px 16px;border-radius:20px;font-size:0.88rem;font-weight:500;}
.keyword-pos{background:rgba(16,185,129,0.15);color:var(--positive);}
.keyword-neg{background:rgba(239,68,68,0.15);color:var(--negative);}

/* Sentences */
.sentence-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--surface2);}
.sentence-item:last-child{border:none;}
.sentence-text{flex:1;font-size:0.92rem;}
.sentence-badge{padding:4px 12px;border-radius:12px;font-size:0.8rem;font-weight:600;white-space:nowrap;}

/* Batch upload */
.upload-zone{border:2px dashed var(--surface2);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:all .25s;margin-bottom:16px;}
.upload-zone:hover{border-color:var(--primary);background:rgba(99,102,241,0.05);}
.upload-zone.dragover{border-color:var(--primary);background:rgba(99,102,241,0.1);}

/* Responsive */
@media(max-width:768px){
  .chart-row{grid-template-columns:1fr;}
  .header h1{font-size:1.8rem;}
}

/* Loading spinner */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--surface2);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="header">
  <h1> AI 中文文本情绪分析系统</h1>
  <p>基于深度学习的中文情感识别 · 支持单文本、批量分析 · 词云可视化</p>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('single')"> 单文本分析</button>
  <button class="tab-btn" onclick="switchTab('batch')"> 批量分析</button>
  <button class="tab-btn" onclick="switchTab('history')"> 历史记录</button>
</div>

<!-- Single Text Panel -->
<div id="singlePanel" class="card">
  <h3 style="margin-bottom:12px;"> 输入文本</h3>
  <textarea id="inputText" placeholder="在这里输入你想要分析的中文文本...
例如：这部电影太精彩了，演员演技在线，剧情扣人心弦！强烈推荐！"></textarea>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="analyzeText()"> 开始分析</button>
    <button class="btn btn-outline" onclick="generateWordCloud()"> 生成词云</button>
    <button class="btn btn-outline" onclick="clearInput()">清空</button>
  </div>
</div>

<!-- Result Area -->
<div id="resultArea"></div>

<!-- Batch Panel -->
<div id="batchPanel" class="card" style="display:none;">
  <h3 style="margin-bottom:12px;"> 批量文本分析</h3>
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <p style="font-size:2rem;"> </p>
    <p>点击上传CSV文件 或 拖拽到此处</p>
    <p style="font-size:0.85rem;color:var(--text2);margin-top:8px;">CSV第一列为待分析文本</p>
  </div>
  <input type="file" id="fileInput" accept=".csv,.txt" style="display:none;" onchange="handleFileUpload(event)">
  <p style="margin:8px 0;color:var(--text2);">或者直接粘贴多行文本（每行一条）：</p>
  <textarea id="batchText" style="width:100%;height:120px;background:var(--bg);border:1px solid var(--surface2);border-radius:var(--radius);color:var(--text);padding:12px;resize:vertical;"></textarea>
  <button class="btn btn-primary" style="margin-top:12px;" onclick="analyzeBatch()"> 批量分析</button>
  <div id="batchResult"></div>
</div>

<!-- History Panel -->
<div id="historyPanel" class="card" style="display:none;">
  <h3> 分析历史记录</h3>
  <div id="historyContent"></div>
</div>

</div>

<script>
const API = 'http://localhost:5000/api';

// ===== Tab Switch =====
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('singlePanel').style.display = tab==='single'?'':'none';
  document.getElementById('batchPanel').style.display = tab==='batch'?'':'none';
  document.getElementById('historyPanel').style.display = tab==='history'?'':'none';
  if(tab==='history') loadHistory();
}

// ===== Single Analysis =====
async function analyzeText(){
  const text = document.getElementById('inputText').value.trim();
  if(!text) return alert('请先输入文本！');
  showLoading('resultArea');
  try{
    const res = await fetch(`${API}/analyze`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    const data = await res.json();
    renderResult(data);
  }catch(e){showError('resultArea','分析失败，请确认后端已启动');}
}

function renderResult(data){
  const labelColors={positive:'label-positive',negative:'label-negative',neutral:'label-neutral'};
  const labelNames={positive:'正面情绪 ',negative:'负面情绪 ',neutral:'中性情绪 '};
  const labelClass = labelColors[data.label]||'label-neutral';

  let html=`<div class="card" style="margin-top:20px;">
    <div class="result-header">
      <span class="result-emoji"></span>
      <div>
        <span class="result-label ${labelClass}">${labelNames[data.label]||''}</span>
        <span class="result-score"> | 得分: ${(data.score*100).toFixed(1)}% | 置信度: ${(data.confidence*100).toFixed(1)}%</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric"><div class="metric-value">${(data.score*100).toFixed(1)}%</div><div class="metric-label">情感得分</div></div>
      <div class="metric"><div class="metric-value">${(data.confidence*100).toFixed(1)}%</div><div class="metric-label">置信度</div></div>
      <div class="metric"><div class="metric-value">${data.sentences_detail?.length||0}</div><div class="metric-label">分析句子数</div></div>
      <div class="metric"><div class="metric-value">${data.keywords?.length||0}</div><div class="metric-label">关键词数</div></div>
    </div>`;

  // Keywords
  if(data.keywords?.length){
    html+=`<h4 style="margin-bottom:8px;"> 关键词提取</h4><div class="keywords">`;
    data.keywords.forEach(k=>{
      const cls = k.weight>0.05?'keyword-pos':'keyword-neg';
      html+=`<span class="keyword ${cls}">${k.word} (${k.weight.toFixed(2)})</span>`;
    });
    html+=`</div>`;
  }

  // Word frequency chart
  if(data.word_freq?.length){
    html+=`<div class="chart-row" style="margin-top:20px;">
      <div class="chart-box" id="wordFreqChart"></div>
      <div class="chart-box" id="sentPieChart"></div>
    </div>`;
  }

  // Sentence detail
  if(data.sentences_detail?.length){
    html+=`<h4 style="margin:20px 0 10px;"> 逐句分析</h4>`;
    data.sentences_detail.forEach(s=>{
      const sc = s.label==='positive'?'label-positive':s.label==='negative'?'label-negative':'label-neutral';
      html+=`<div class="sentence-item">
        <span class="sentence-text">${s.text}</span>
        <span class="sentence-badge ${sc}">${(s.score*100).toFixed(0)}% ${s.label==='positive'?'':s.label==='negative'?'':''}</span>
      </div>`;
    });
  }

  html+=`</div>`;
  document.getElementById('resultArea').innerHTML=html;

  // Render charts
  if(data.word_freq?.length) renderWordFreqChart(data.word_freq);
  if(data.sentences_detail?.length) renderSentPieChart(data.sentences_detail);
}

// ===== Charts =====
function renderWordFreqChart(wordFreq){
  const dom = document.getElementById('wordFreqChart');
  if(!dom) return;
  const chart = echarts.init(dom);
  chart.setOption({
    title:{text:'词频统计 Top 20',textStyle:{color:'#e2e8f0',fontSize:14},left:'center'},
    tooltip:{trigger:'axis'},
    xAxis:{type:'category',data:wordFreq.slice(0,20).map(w=>w.word),axisLabel:{color:'#94a3b8',rotate:45}},
    yAxis:{type:'value',axisLabel:{color:'#94a3b8'}},
    series:[{type:'bar',data:wordFreq.slice(0,20).map(w=>w.count),
      itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
        {offset:0,color:'#818cf8'},{offset:1,color:'#6366f1'}
      ])}}],
    grid:{top:50,right:20,bottom:70,left:50}
  });
}

function renderSentPieChart(sentences){
  const dom = document.getElementById('sentPieChart');
  if(!dom) return;
  const pos=sentences.filter(s=>s.label==='positive').length;
  const neg=sentences.filter(s=>s.label==='negative').length;
  const neu=sentences.filter(s=>s.label==='neutral').length;
  const chart = echarts.init(dom);
  chart.setOption({
    title:{text:'句子情感分布',textStyle:{color:'#e2e8f0',fontSize:14},left:'center'},
    tooltip:{trigger:'item'},
    legend:{bottom:10,textStyle:{color:'#94a3b8'}},
    series:[{type:'pie',radius:['40%','70%'],center:['50%','45%'],
      data:[
        {value:pos,name:'正面',itemStyle:{color:'#10b981'}},
        {value:neg,name:'负面',itemStyle:{color:'#ef4444'}},
        {value:neu,name:'中性',itemStyle:{color:'#f59e0b'}},
      ],
      label:{color:'#94a3b8'}
    }]
  });
}

// ===== WordCloud =====
async function generateWordCloud(){
  const text = document.getElementById('inputText').value.trim();
  if(!text) return alert('请先输入文本！');
  try{
    const res = await fetch(`${API}/wordcloud`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    if(res.ok){
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const win = window.open('','_blank');
      win.document.write(`<img src="${url}" style="max-width:100%;">`);
    }
  }catch(e){alert('词云生成失败');}
}

// ===== Batch Analysis =====
function handleFileUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById('batchText').value = ev.target.result;
  };
  reader.readAsText(file);
}

async function analyzeBatch(){
  const text = document.getElementById('batchText').value.trim();
  if(!text) return alert('请输入文本或上传文件！');
  const texts = text.split('\n').filter(t=>t.trim());
  if(!texts.length) return alert('未找到有效文本行！');

  showLoading('batchResult');
  try{
    const res = await fetch(`${API}/analyze/batch`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({texts})
    });
    const data = await res.json();
    renderBatchResult(data);
  }catch(e){showError('batchResult','批量分析失败');}
}

function renderBatchResult(data){
  const s = data.summary;
  let html=`<div class="card" style="margin-top:20px;">
    <h4> 批量分析结果（共 ${s.total} 条）</h4>
    <div class="metrics">
      <div class="metric"><div class="metric-value label-positive">${s.positive}</div><div class="metric-label">正面</div></div>
      <div class="metric"><div class="metric-value label-negative">${s.negative}</div><div class="metric-label">负面</div></div>
      <div class="metric"><div class="metric-value label-neutral">${s.neutral}</div><div class="metric-label">中性</div></div>
      <div class="metric"><div class="metric-value">${(s.avg_score*100).toFixed(1)}%</div><div class="metric-label">平均得分</div></div>
    </div>
    <div class="chart-box chart-full" id="batchPieChart" style="height:300px;"></div>`;

  if(data.results?.length){
    html+=`<div style="max-height:300px;overflow-y:auto;margin-top:16px;">`;
    data.results.forEach(r=>{
      const sc=r.label==='positive'?'label-positive':r.label==='negative'?'label-negative':'label-neutral';
      html+=`<div class="sentence-item">
        <span class="sentence-text">${r.text.slice(0,80)}</span>
        <span class="sentence-badge ${sc}">${(r.score*100).toFixed(0)}%</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('batchResult').innerHTML=html;

  // Pie chart
  const dom = document.getElementById('batchPieChart');
  if(dom){
    const chart = echarts.init(dom);
    chart.setOption({
      title:{text:'情感分布概览',textStyle:{color:'#e2e8f0',fontSize:14},left:'center'},
      tooltip:{trigger:'item'},
      series:[{type:'pie',radius:['45%','75%'],
        data:[
          {value:s.positive,name:'正面',itemStyle:{color:'#10b981'}},
          {value:s.negative,name:'负面',itemStyle:{color:'#ef4444'}},
          {value:s.neutral,name:'中性',itemStyle:{color:'#f59e0b'}},
        ],
        label:{color:'#94a3b8',formatter:'{b}: {c} ({d}%)'}
      }]
    });
  }
}

// ===== History =====
async function loadHistory(){
  try{
    const res = await fetch(`${API}/history`);
    const data = await res.json();
    document.getElementById('historyContent').innerHTML=`
      <div class="metrics" style="margin:16px 0;">
        <div class="metric"><div class="metric-value">${data.total||0}</div><div class="metric-label">总分析次数</div></div>
        <div class="metric"><div class="metric-value label-positive">${data.stats?.positive||0}</div><div class="metric-label">正面</div></div>
        <div class="metric"><div class="metric-value label-negative">${data.stats?.negative||0}</div><div class="metric-label">负面</div></div>
        <div class="metric"><div class="metric-value label-neutral">${data.stats?.neutral||0}</div><div class="metric-label">中性</div></div>
      </div>
      ${(data.records||[]).reverse().slice(0,15).map(r=>`
        <div class="sentence-item">
          <span class="sentence-text">${r.text?.slice(0,80)||''}</span>
          <span class="sentence-badge ${r.label==='positive'?'label-positive':r.label==='negative'?'label-negative':'label-neutral'}">${(r.score*100).toFixed(0)}%</span>
          <span style="font-size:0.75rem;color:var(--text2);">${r.timestamp?.slice(0,10)||''}</span>
        </div>
      `).join('')}
    `;
  }catch(e){document.getElementById('historyContent').innerHTML='<p style="color:var(--text2);">暂无历史记录</p>';}
}

// ===== Helpers =====
function showLoading(id){
  document.getElementById(id).innerHTML='<div class="card" style="text-align:center;padding:40px;"><div class="spinner"></div><p style="margin-top:12px;color:var(--text2);">分析中...</p></div>';
}
function showError(id,msg){
  document.getElementById(id).innerHTML=`<div class="card" style="text-align:center;padding:40px;color:var(--negative);"><p>${msg}</p></div>`;
}
function clearInput(){document.getElementById('inputText').value='';document.getElementById('resultArea').innerHTML='';}

// Drag & drop for batch
const zone = document.getElementById('uploadZone');
if(zone){
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if(file){const r=new FileReader();r.onload=ev=>document.getElementById('batchText').value=ev.target.result;r.readAsText(file);}
  });
}
</script>
</body>
</html>
